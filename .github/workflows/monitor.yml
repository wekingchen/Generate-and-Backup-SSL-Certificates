name: Codex 速蹬窗口监控

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检查窗口状态并推送 Bark
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
        run: |
          set -euo pipefail

          json=$(curl -fsSL https://codex-reset-radar.pages.dev/current.json)

          window_open=$(echo "$json" | jq -r '.window_open // false')
          prob_24h=$(echo "$json" | jq -r '.prediction.probability_24h // 0')
          rec_action=$(echo "$json" | jq -r '.recommended_action // "wait"')
          message=$(echo "$json" | jq -r '.message // ""')

          prob_percent=$(python3 -c "import sys; print(f'{float(sys.argv[1]) * 100:.0f}')" "$prob_24h" 2>/dev/null || echo "0")

          case "$rec_action" in
            use_remaining_tokens)
              action_text="立即消耗剩余额度"
              ;;
            prepare)
              action_text="准备速蹬"
              ;;
            monitor)
              action_text="持续观察"
              ;;
            wait)
              action_text="继续等待"
              ;;
            *)
              action_text="$rec_action"
              ;;
          esac

          should_alert=false

          if [ "$window_open" = "true" ]; then
            should_alert=true
          elif python3 -c "import sys; exit(0 if float(sys.argv[1]) > 0.3 else 1)" "$prob_24h" 2>/dev/null; then
            should_alert=true
          elif [ "$rec_action" != "wait" ]; then
            should_alert=true
          fi

          if [ "$should_alert" = true ]; then
            if [ "$window_open" = "true" ]; then
              title="🚀 Codex速蹬窗口已开启"
              status_text="开放"
            else
              title="⏳ Codex速蹬机会预警"
              status_text="关闭"
            fi

            body=$(printf "状态：%s\n\n建议：%s\n24小时开启概率：%s%%\n\n%s" "$status_text" "$action_text" "$prob_percent" "$message")

            base=$(echo "$BARK_URL" | sed 's:/*$::')/

            encoded_title=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$title")
            encoded_body=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$body")

            curl -fsS "${base}${encoded_title}/${encoded_body}?group=Codex&isArchive=1&ttl=86400" -o /dev/null

            echo "已推送告警"
          else
            echo "当前状态正常，不推送"
          fi
